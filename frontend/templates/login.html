<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Travel CRM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
:root {
  --bg: #f8fafc; --surface: #ffffff; --border: #e2e8f0;
  --accent: #f97316; --text: #0d1117; --text2: #475569; --text3: #94a3b8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

/* Animated background */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 60% 50% at 50% -20%, rgba(249,115,22,.12), transparent),
              radial-gradient(ellipse 40% 40% at 80% 80%, rgba(59,130,246,.06), transparent);
  pointer-events: none;
}

.login-container { width: 100%; max-width: 420px; padding: 20px; }
.brand { text-align: center; margin-bottom: 40px; }
.brand-logo { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; color: var(--accent); display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 6px; }
.brand-logo i { font-size: 30px; }
.brand-sub { font-size: 13px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; }

.login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 36px; }
.login-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.login-sub { font-size: 13px; color: var(--text3); margin-bottom: 28px; }

.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 8px; }
.input-wrap { position: relative; }
.input-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; }
.input-wrap input { width: 100%; background: #fce3cb; border: 1px solid var(--border); color: var(--text); padding: 11px 12px 11px 36px; border-radius: 10px; font-size: 14px; font-family: 'DM Sans', sans-serif; transition: border-color .15s; }
.input-wrap input:focus { outline: none; border-color: var(--accent); }
.input-wrap .toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text3); cursor: pointer; }

.btn-login { width: 100%; background: var(--accent); color: #fff; border: none; padding: 13px; border-radius: 10px; font-size: 15px; font-weight: 700; font-family: 'Syne', sans-serif; cursor: pointer; margin-top: 8px; transition: all .15s; letter-spacing: .3px; }
.btn-login:hover { background: #fb923c; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(249,115,22,.25); }
.btn-login:active { transform: translateY(0); }
.btn-login:disabled { opacity: .6; cursor: not-allowed; transform: none; }

.error-msg { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.2); color: #ef4444; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; align-items: center; gap: 8px; }
.error-msg.show { display: flex; }

.demo-hint { margin-top: 20px; padding: 12px 16px; background: rgba(249,115,22,.06); border: 1px solid rgba(249,115,22,.15); border-radius: 10px; font-size: 12px; color: var(--text3); text-align: center; }
.demo-hint strong { color: var(--accent); }
</style>
</head>
<body>
<div class="login-container">
  <div class="brand">
    <div class="brand-logo"><i class="fas fa-plane-departure"></i> TravelCRM</div>
    <div class="brand-sub">Sales Management System</div>
  </div>

  <div class="login-card">
    <div class="login-title">Welcome back</div>
    <div class="login-sub">Sign in to your account to continue</div>

    <div class="error-msg" id="error-msg">
      <i class="fas fa-exclamation-circle"></i>
      <span id="error-text">Invalid username or password</span>
    </div>

    <div class="form-group">
      <label>Username</label>
      <div class="input-wrap">
        <i class="fas fa-user"></i>
        <input type="text" id="username" placeholder="Enter username" autocomplete="username">
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
        <button class="toggle-pw" type="button" onclick="togglePw(this)">
          <i class="fas fa-eye"></i>
        </button>
      </div>
    </div>

    <button class="btn-login" id="login-btn" onclick="doLogin()">
      <i class="fas fa-right-to-bracket"></i> Sign In
    </button>

    <!-- <div class="demo-hint">
      Default credentials: <strong>admin</strong> / <strong>admin123</strong>
    </div> -->
  </div>
</div>

<script>
const API = '{{ API_BASE }}';

document.getElementById('password').addEventListener('keyup', e => {
  if (e.key === 'Enter') doLogin();
});

function togglePw(btn) {
  const inp = btn.previousElementSibling.previousElementSibling;
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.querySelector('i').className = inp.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}

async function doLogin() {
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('error-msg');
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!username || !password) {
    document.getElementById('error-text').textContent = 'Please enter username and password';
    err.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
  err.classList.remove('show');

  try {
    const res = await fetch(API + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    
    localStorage.setItem('crm_token', data.token);
    localStorage.setItem('crm_user', JSON.stringify(data.user));
    window.location.href = '/dashboard';
  } catch(e) {
    document.getElementById('error-text').textContent = e.message;
    err.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-right-to-bracket"></i> Sign In';
  }
}
</script>
</body>
</html>
